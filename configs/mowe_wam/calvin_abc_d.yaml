  "report": {
    "metrics": ["average_sequence_length", "sr_at_1", "sr_at_2", "sr_at_3", "sr_at_4", "sr_at_5"],
    "extra_metrics": ["per_task_success", "failure_position", "policy_queries", "prefix_lengths"],
    "bind_repo_commit": true,
    "bind_checkpoint": true,
    "bind_seed": true
