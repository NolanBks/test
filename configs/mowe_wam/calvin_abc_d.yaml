    "reject_validation_environment": true
  },
  "action": {
    "action_mode": "relative_cartesian",
    "rotation_representation": "euler_xyz",
    "motion_q01": "TBD",
    "motion_q99": "TBD",
    "motion_mask": [true, true, true, true, true, true],
    "gripper_open_value": "TBD",
