{
  "base_config": "flow_wam_base.yaml",
  "stage": "nominal_flow_pretrain",
  "output_dir": "outputs/train/nominal_flow_wam",
  "training": {
    "device": "auto",
    "precision": "bf16",
    "batch_size": 1,
    "grad_accumulation_steps": 8,
    "max_steps": 50000,
    "learning_rates": {"view_fusion": 0.0001, "memory_encoder": 0.0001, "nominal_flow": 0.0001, "gripper_head": 0.0001, "world_model": 0.0001},
    "weight_decay": 0.01,
    "adam_betas": [0.9, 0.95],
    "warmup_ratio": 0.04,
    "min_lr_ratio": 0.10,
    "max_grad_norm": 1.0,
    "save_freq": 500,
    "log_freq": 10
  }
}
